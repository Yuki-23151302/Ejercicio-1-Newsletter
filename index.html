<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Subscription</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<main class="container">
    
    <!-- Ícono -->
    <img src="images/logo.svg" alt="Newsletter Icon" class="icon">

    <h1>Join Our Newsletter</h1>
    <p>
        Keep up with our latest collections, exclusive deals, and special offers!
        We introduce a new collection every week, so stay tuned to snag the hottest items just for you.
    </p>

    <div class="card">
        <input type="email" placeholder="Enter your email address">
        <button>Subscribe now</button>
        <span>Your email is 100% confidential and won’t send you any spam.</span>
    </div>

</main>

</body>
</html>
